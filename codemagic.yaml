workflows:
  ios-release:
    name: BeastLauncher iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 16.4
      cocoapods: default
      vars:
        BUNDLE_ID: com.beastmeds.beastlauncher
        XCODE_PROJECT: BeastLauncher.xcodeproj
        XCODE_SCHEME: BeastLauncher
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set Xcode version
        script: xcode-select -p

      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            clean build \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build

      - name: Package IPA (unsigned)
        script: |
          cd $CM_BUILD_DIR/build
          mkdir -p Payload
          cp -r BeastLauncher.app Payload/
          zip -r BeastLauncher.ipa Payload/
          echo "IPA created: $CM_BUILD_DIR/build/BeastLauncher.ipa"

    artifacts:
      - $CM_BUILD_DIR/build/BeastLauncher.ipa
      - $CM_BUILD_DIR/build/BeastLauncher.app

    publishing:
      email:
        recipients:
          - beastmeds@gmail.com
        notify:
          success: true
          failure: true
